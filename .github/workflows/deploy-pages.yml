name: Actualizar dashboard desde Google Sheets
run-name: Actualizar datos y publicar · ${{ github.event_name }}

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "15 10 * * 1"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Descargar el proyecto
        uses: actions/checkout@v6
      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Instalar dependencias verificadas
        run: pnpm install --frozen-lockfile
      - name: Generar datos públicos sanitizados
        run: pnpm run generate:public
        env:
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
      - name: Probar, compilar y auditar
        run: pnpm run verify:public
        env:
          # Opcional. Debe apuntar a OTRO archivo de Sheets sin datos personales.
          VITE_PUBLIC_GOOGLE_SHEET_ID: ${{ vars.PUBLIC_GOOGLE_SHEET_ID }}
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
      - name: Empaquetar sitio estático
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
